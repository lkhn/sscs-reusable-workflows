name: Update Pre-commit Hooks

permissions: {}

on:
  workflow_dispatch:

jobs:
  update_and_run:
    name: Update and Run
    permissions:
      contents: write
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - name: Install prek
        uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2.0.5
        with:
          install-only: true

      - name: Check for hook updates
        id: pre_commit_hooks
        run: |
          set -x

          exit_code='0'
          prek auto-update --freeze --verbose --exit-code || exit_code=$?
          if [ "$exit_code" = '1' ]; then
              printf '%s=%s\n' 'updated' 'true' >> "$GITHUB_OUTPUT"
              exit 0
          fi
          exit "$exit_code"

      - name: Run updated hooks
        id: pre_commit_run
        if: ${{ steps.pre_commit_hooks.outputs.updated }}
        continue-on-error: true
        run: prek run --all-files --show-diff-on-failure --verbose

      - name: Create PR if any hook is updated and runs without any issue
        if: ${{ steps.pre_commit_hooks.outputs.updated && steps.pre_commit_run.outcome == 'success' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git diff prek.toml
          git checkout -b ci/pre_commit/update
          git add prek.toml
          git commit -m 'chore(pre-commit): update hooks'
          git push origin ci/pre_commit/update

      - name: Create issue if any of updated hooks runs any issue
        if: ${{ steps.pre_commit_run.outcome == 'failure' }}
        run: |
          printf 'DEBUG: TODO: Created a new Issue\n'
